services:
  # Nginx: The Gatekeeper (Only service with exposed ports 80/443)
  nginx:
    image: nginx:alpine
    container_name: astu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Local SSL certs
    networks:
      - frontend-net
    depends_on:
      - frontend
      - backend

  # Frontend: Built for production (Static files served via Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - frontend-net
    # NO ports exposed! Nginx handles access.

  # Backend: Running in production mode
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      REDIS_HOST: redis
    networks:
      - frontend-net
      - backend-net
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # Database: Completely isolated in backend-net
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s

  # Redis: Completely isolated
  redis:
    image: redis:7-alpine
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

networks:
  frontend-net: # Nginx, Frontend, and Backend
  backend-net:  # Backend, Postgres, and Redis (Isolated)

volumes:
  postgres_data: