services:
  # PostgreSQL Database for development
  postgres:
    image: postgres:18-alpine
    container_name: astu-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: astu_complaints_dev
      POSTGRES_USER: astu_user
      POSTGRES_PASSWORD: astu_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - astu-dev-network

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: astu-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - astu-dev-network

  # Backend development server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: astu-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://astu_user:astu_password@postgres:5432/astu_complaints_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-key
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - astu-dev-network
    command: npm run dev

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  astu-dev-network:
    driver: bridge
