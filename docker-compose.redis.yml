services:
  redis:
    image: redis:7-alpine
    container_name: astu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    environment:
      - REDIS_PASSWORD=
    networks:
      - astu-network

volumes:
  redis_data:
    driver: local

networks:
  astu-network:
    driver: bridge
