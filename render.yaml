services:
  # PostgreSQL Database
  - type: pserv
    name: astu-postgres
    env: docker
    plan: starter
    repo: https://github.com/render-examples/postgres.git
    dockerfilePath: ./Dockerfile
    envVars:
      - key: POSTGRES_DB
        value: astu_complaints
      - key: POSTGRES_USER
        value: astu_user
      - key: POSTGRES_PASSWORD
        value: astu_password

  # Redis Instance
  - type: pserv
    name: astu-redis
    env: docker
    plan: starter
    repo: https://github.com/render-examples/redis.git
    dockerfilePath: ./Dockerfile
    envVars:
      - key: REDIS_PASSWORD
        value: ""

  # Backend Web Service
  - type: web
    name: astu-backend
    env: node
    plan: starter
    buildCommand: "cd server && npm install && npx prisma generate"
    startCommand: "cd server && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: astu-postgres
          property: connectionString
      - key: DATABASE_NAME
        value: astu_complaints
      - key: DATABASE_USER
        value: astu_user
      - key: REDIS_HOST
        value: ${astu-redis.host}
      - key: REDIS_PORT
        value: ${astu-redis.port}
      - key: REDIS_PASSWORD
        value: ""
      - key: JWT_SECRET
        value: astu-super-secret-jwt-key-change-in-production-2024
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: girmasamuel200@gmail.com
      - key: FRONTEND_URL
        value: https://astu-complient.firatech.systems
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_PATH
        value: ./uploads
      - key: LOG_LEVEL
        value: info
      - key: LOG_FILE
        value: ./logs/app.log
      - key: BCRYPT_ROUNDS
        value: 12
      - key: SESSION_SECRET
        value: astu-session-secret-change-in-production
      - key: CORS_ORIGIN
        value: https://astu-complient.firatech.systems

  # Frontend Static Site
  - type: web
    name: astu-frontend
    env: static
    plan: starter
    buildCommand: "cd client && npm install && npm run build"
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://${astu-backend.host}/api
      - key: VITE_NODE_ENV
        value: production

version: "1"
